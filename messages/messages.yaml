# messages/messages.yaml
# Все текстовые сообщения бота

# === Главное меню ===
main_menu:
  title: |
    👋 **Добро пожаловать в Matrix Registration Bot!**
    
    Выберите действие:
  
# === Помощь ===
help:
  title: |
    📖 **Справка по боту**
    
    🔹 **Доступные команды:**
    • /start — Главное меню
    • /register — Регистрация нового аккаунта
    • /myaccounts — Мои аккаунты Matrix
    • /resetpassword — Сбросить пароль
    • /help — Эта справка
    
    🔹 **Возможности:**
    ✅ Регистрация аккаунтов
    ✅ Управление паролями
    ✅ Несколько аккаунтов на пользователя
    
    🔹 **Ограничения:**
    • Максимум {max_accounts} аккаунта
    • Логин: 3-20 символов (латиница + цифры)
    
    ❓ **Вопросы?** Свяжитесь с администратором.

# === Регистрация ===
register:
  prompt: |
    📝 Введите желаемый **логин** (3-20 символов, латиница + цифры):
    
    Пример: `alex`
  checking: "🔍 Проверяю доступность..."
  available: "✅ Логин свободен"
  taken: "❌ Логин занят. Выберите другой."
  sent: "✅ Заявка отправлена. Ожидайте подтверждения."
  approved: |
    🎉 **Аккаунт создан!**
    
    🆔 **Логин:** `{login}`
    🔑 **Пароль:** `{password}`
    
    ⚠️ **Сохраните пароль!**
    
    {server_info}
    
    📖 **Инструкция по подключению:**
    {guide_url}
  rejected: "❌ Заявка отклонена."
  limit_reached: "❌ Достигнут лимит аккаунтов ({max})."

# === Аккаунты ===
accounts:
  empty: |
    📭 У вас пока нет аккаунтов.
    
    Используйте меню для регистрации.
  title: "📋 **Ваши аккаунты Matrix:**\n\n"
  account_item: "• `{login}`\n"

# === Сброс пароля ===
password:
  no_accounts: "❌ У вас нет аккаунтов для сброса пароля."
  select: "🔑 **Выберите аккаунт:**\n\n"
  resetting: "⏳ Сбрасываю пароль..."
  success: |
    🔑 **Пароль сброшен!**
    
    🆔 Аккаунт: `{login}`
    🔕 Новый пароль: `{password}`
    
    ⚠️ Сохраните пароль!
  error: "❌ Ошибка сброса пароля."

# === Валидация ===
validation:
  empty: "❌ Логин не может быть пустым"
  too_short: "❌ Логин должен быть не менее 3 символов"
  too_long: "❌ Логин не должен превышать 20 символов"
  invalid_format: "❌ Логин должен начинаться с буквы и содержать только латиницу и цифры"
  reserved: "❌ Логин '{login}' зарезервирован"
  banned: "❌ Ваш доступ к боту заблокирован."

# === Кнопки ===
buttons:
  registration: "📝 Регистрация"
  my_accounts: "📋 Мои аккаунты"
  reset_password: "🔑 Сброс пароля"
  help: "📖 Помощь"
  back: "⬅️ Назад"
  confirm: "✅ Подтвердить"
  reject: "❌ Отклонить"
  delete: "🗑️ {username}"
  ban: "🔴 Забанить"
  unban: "🟢 Разбанить"
  home: "🏠 В главное меню"

# === Админ панель ===
admin:
  title: |
    🛡 **Админ-панель**
    
    📊 **Статистика:**
    • Всего: {total}
    • Активных: {active}
    • Забаненных: {banned}
    • Аккаунтов: {accounts}
  users_title: "👥 **Пользователи:**\n\n"
  stats_title: |
    📊 **Статистика:**
    
    • Всего: {total}
    • Активных: {active}
    • Забаненных: {banned}
    • Аккаунтов: {accounts}
  search_prompt: "🔍 Введите запрос:"
  search_empty: "🔍 Ничего не найдено."
  search_title: "🔍 **Поиск \"{query}\":**\n\n"
  logs_title: "📜 **Логи (7 дней):**\n\n"
  user_title: |
    👤 **Пользователь**
    
    🆔 `{chat_id}`
    👤 {name}
    📊 Аккаунтов: {account_count}
    🚫 Статус: `{status}`
  user_accounts: "📋 **Аккаунты:**\n"
  deleted: "✅ **Удалён:** `{username}`\n\n📊 Осталось: {remaining}"
  banned: "✅ Забанен: `{name}`"
  unbanned: "✅ Разбанен: `{name}`"
  no_rights: "⛔ Нет прав"
  processing: "⏳ Обрабатываю..."
  deleting: "⏳ Удаляю аккаунт..."
  error: "❌ Ошибка"

# === Сервер ===
server:
  info: |
    🌐 **Наш сервер:** `{domain}`
    
    ✅ Работает стабильно
    🔒 Шифрование включено
    🌍 Федерация активна

# === Ошибки ===
errors:
  callback_expired: "⏰ Время запроса истекло. Попробуйте снова."
  not_your_request: "⛔ Это не ваш запрос"
  user_not_found: "Пользователь не найден"
  database_error: "❌ Ошибка базы данных"
  matrix_error: "❌ Ошибка Matrix сервера"
  unknown: "❌ Произошла неизвестная ошибка"

# === Уведомления ===
notifications:
  account_deleted: "⚠️ Ваш аккаунт `{login}` был удалён администратором."
  access_blocked: "❌ Ваш доступ к боту заблокирован."
  access_restored: "✅ Ваш доступ к боту восстановлен."